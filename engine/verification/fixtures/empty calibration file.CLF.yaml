# Golden fixture for samples/empty calibration file.CLF
#
# This file demonstrates the fixture-golden pattern used by the verification
# harness. The harness loads this YAML, then compares the parsed ShowFile
# against the values listed below — fields not listed are skipped, so the
# fixture can be grown incrementally as more parameters are validated.
#
# More fixtures (one per calibration file) and more fields per fixture will
# be added per parameter class as the harness matures. Today's coverage
# intentionally stays minimal: channel count and channel names for the empty
# calibration baseline. Future additions will cover hpf/eq/gate/comp values
# from the dynamics, eq, and fader/pan/mute calibration files.
#
# Channel names below reflect the actual factory-default Yamaha CL5 naming
# observed when parsing this empty calibration file with the binary parser
# (note the single space between "ch" and the digit for ch 1-9).

channel_count: 72
channel_names:
